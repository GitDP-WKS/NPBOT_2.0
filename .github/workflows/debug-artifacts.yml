name: Debug artifacts

on:
  push:
    branches: ["agent/knowledge-pit-v3"]

jobs:
  debug:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -r requirements.txt -r requirements-dev.txt
      - name: Run tests and save output
        env:
          RES_AI_ALLOW_SQLITE: "1"
          RES_AI_DISABLE_BACKGROUND_WORKER: "1"
        run: |
          pytest -vv > pytest-output.txt 2>&1 || true
          ruff check . > ruff-output.txt 2>&1 || true
      - name: Pack source
        run: |
          tar --exclude=.git --exclude=.venv -czf source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: debug-snapshot
          path: |
            pytest-output.txt
            ruff-output.txt
            source-snapshot.tar.gz
          retention-days: 1
