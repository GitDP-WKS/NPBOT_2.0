name: CI

on:
  pull_request:
  push:
    branches: ["main", "agent/res-ai-v2"]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BRANCH="${HEAD_BRANCH:-$REF_NAME}"
          git clone -q --depth 1 --branch "$BRANCH" "https://github.com/$REPOSITORY.git" source
          cp -a source/. .
          rm -rf source .git
      - name: Create environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Tests
        run: .venv/bin/pytest
      - name: Compile
        run: .venv/bin/python -m compileall -q app.py res_ai_v2 tests
