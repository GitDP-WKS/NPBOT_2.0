name: CI

on:
  pull_request:
  push:
    branches: ["main", "agent/res-ai-v2"]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Create environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Tests
        run: .venv/bin/pytest
      - name: Compile
        run: .venv/bin/python -m compileall -q app.py res_ai_v2 tests
