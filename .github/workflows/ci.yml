name: CI

on:
  pull_request:
  push:
    branches: ["main", "agent/res-ai-v2"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest
      - name: Compile
        run: python -m compileall -q app.py res_ai_v2 tests
