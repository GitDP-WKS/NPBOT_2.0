name: Daily RES AI audit

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RES_AI_DISABLE_BACKGROUND_WORKER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check configuration
        id: configuration
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Secret DATABASE_URL не задан. Запуск безопасно пропущен."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install
        if: steps.configuration.outputs.configured == 'true'
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -r requirements.txt
      - name: Run daily audit
        if: steps.configuration.outputs.configured == 'true'
        run: python scripts/run_daily_agent.py
